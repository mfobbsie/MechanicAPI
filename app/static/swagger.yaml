#app/static/swagger.yaml

swagger: '2.0'
info:
  title: "Mechanics API"
  description: "This is an API for managing mechanics and service tickets"
  version: "1.0.0"
host: "127.0.0.1:5000"
schemes:
  - "http"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

paths:

  /customers:
    post:
      tags:
        - Customers
      summary: "Endpoint to create/register a new customer."
      description: "Endpoint to create a new customer in our system. Emails must be unique."
      parameters:
        - in: body
          name: body
          description: "Information required to create a new Customer."
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerPayload"
      responses:
        201:
          description: "Successful Customer Creation"
          schema:
            $ref: "#/definitions/CreateCustomerResponse"
          examples:
            application/json:
              id: 1
              name: John Doe
              DOB: "1900-01-01"
              email: johnd@email.com

    get:
      tags:
        - Customers
      summary: "Endpoint to get all customers"
      description: "Retrieve a list of all customers in the system."
      responses:
        200:
          description: "A list of customers"
          schema:
            type: array
            items:
              $ref: "#/definitions/Customer"

  /customers/{customer_id}:
    put:
      tags:
        - Customers
      summary: "Update customer information"
      description: "Customers can update their own account. Admins may update any customer."
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
        - in: body
          name: body
          description: "Fields to update for this customer"
          required: true
          schema:
            $ref: "#/definitions/Customer"
      responses:
        200:
          description: "Customer updated successfully"
          schema:
            $ref: "#/definitions/Customer"
        400:
          description: "Invalid input"
        403:
          description: "Unauthorized"
        404:
          description: "Customer not found"

    delete:
      tags:
        - Customers
      summary: "Delete a customer"
      description: "Customers may delete their own account. Admins may delete any customer."
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: customer_id
          required: true
          type: integer
      responses:
        200:
          description: "Customer deleted successfully"
          schema:
            $ref: "#/definitions/DeleteCustomerResponse"
          examples:
            application/json:
              message: "Customer 12 deleted successfully"
        400:
          description: "Cannot delete customer with existing service tickets"
        403:
          description: "Unauthorized"
        404:
          description: "Customer not found"

  /customers/login:
    post:
      tags:
        - Customers
      summary: "Login endpoint (generates token)"
      description: "Validates customer credentials and returns a token."
      parameters:
        - in: body
          name: body
          description: "Login Credentials"
          required: true
          schema:
            $ref: "#/definitions/LoginCredentials"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/LoginResponse"

  /mechanics/login:
    post:
      tags:
        - Mechanics
      summary: "Mechanic login"
      description: "Authenticate a mechanic and return a JWT token."
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/MechanicLoginPayload"
          examples:
            application/json:
              email: "mechanic1@example.com"
              password: "1234"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/MechanicLoginResponse"
        401:
          description: "Invalid email or password"


  /mechanics:
    post:
      tags:
        - Mechanics
      summary: "Create a new mechanic (Admin only)"
      security:
        - bearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMechanicPayload"
          examples:
            application/json:
              name: "Jordan Smith"
              phone: "555-123-9876"
              email: "jordan.smith@example.com"
              password: "securePass123"
              salary: 72000
      responses:
        201:
          description: "Mechanic created successfully"
          schema:
            $ref: "#/definitions/Mechanic"
        400:
          description: "Validation error or duplicate email"
        403:
          description: "Unauthorized"

    get:
      tags:
        - Mechanics
      summary: "Get all mechanics (paginated)"
      parameters:
        - in: query
          name: page
          type: integer
        - in: query
          name: per_page
          type: integer
      responses:
        200:
          description: "List of mechanics"
          schema:
            type: object
            properties:
              mechanics:
                type: array
                items:
                  $ref: "#/definitions/Mechanic"
              total:
                type: integer
              page:
                type: integer
              per_page:
                type: integer
              pages:
                type: integer
              has_next:
                type: boolean
              has_prev:
                type: boolean
              next_page:
                type: integer
              prev_page:
                type: integer

    put:
      tags:
        - Mechanics
      summary: "Update mechanic profile (Mechanic or Admin)"
      description: "Mechanics may update their own profile. Admins may update any mechanic by including the mechanic ID in the request body."
      security:
        - bearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMechanicPayload"
          examples:
            application/json:
              id: 3
              phone: "555-999-8888"
              password: "newPassword123"
              salary: 75000
      responses:
        200:
          description: "Mechanic updated"
          schema:
            $ref: "#/definitions/Mechanic"
        403:
          description: "Unauthorized"
        404:
          description: "Mechanic not found"

  /mechanics/{mechanic_id}:
    get:
      tags:
        - Mechanics
      summary: "Get mechanic by ID"
      parameters:
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "Mechanic found"
          schema:
            $ref: "#/definitions/Mechanic"
        404:
          description: "Mechanic not found"

    delete:
      tags:
        - Mechanics
      summary: "Delete mechanic (Admin only)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "Mechanic deleted successfully"
          schema:
            $ref: "#/definitions/DeleteMechanicResponse"
        403:
          description: "Unauthorized"
        404:
          description: "Mechanic not found"


  /mechanics/{mechanic_id}/service_tickets:
    get:
      tags:
        - Mechanics
      summary: "Get all service tickets assigned to a mechanic"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "List of service tickets"
          schema:
            type: array
            items:
              $ref: "#/definitions/ServiceTicket"
        403:
          description: "Unauthorized"
        404:
          description: "Mechanic not found"


  /mechanics/popular:
    get:
      tags:
        - Mechanics
      summary: "Get mechanics ranked by number of service tickets (Admin only)"
      security:
        - bearerAuth: []
      responses:
        200:
          description: "List of mechanics with ticket counts"
          schema:
            type: array
            items:
              $ref: "#/definitions/PopularMechanicResponse"
        403:
          description: "Unauthorized"

  /service_tickets:
    post:
      tags:
        - Service Tickets
      summary: "Create a new service ticket"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateServiceTicketPayload"
          examples:
            application/json:
              VIN: "1HGCM82633A004352"
              service_date: "2025-03-21"
              description: "Oil change and tire rotation"
              customer_id: 4
      responses:
        201:
          description: "Service ticket created"
          schema:
            $ref: "#/definitions/ServiceTicket"
        400:
          description: "Validation error or duplicate VIN + date"

    get:
      tags:
        - Service Tickets
      summary: "Get all service tickets (paginated)"
      parameters:
        - in: query
          name: page
          type: integer
        - in: query
          name: per_page
          type: integer
      responses:
        200:
          description: "List of service tickets"
          schema:
            type: object
            properties:
              service_tickets:
                type: array
                items:
                  $ref: "#/definitions/ServiceTicket"
              total: { type: integer }
              page: { type: integer }
              per_page: { type: integer }
              pages: { type: integer }
              has_next: { type: boolean }
              has_prev: { type: boolean }
              next_page: { type: integer }
              prev_page: { type: integer }

  /service_tickets/{ticket_id}:
    get:
      tags:
        - Service Tickets
      summary: "Get a service ticket by ID"
      parameters:
        - in: path
          name: ticket_id
          required: true
          type: integer
      responses:
        200:
          description: "Service ticket found"
          schema:
            $ref: "#/definitions/ServiceTicket"
        404:
          description: "Service ticket not found"

  /service_tickets/{ticket_id}/update:
    put:
      tags:
        - Service Tickets
      summary: "Update a service ticket"
      parameters:
        - in: path
          name: ticket_id
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateServiceTicketPayload"
          examples:
            application/json:
              description: "Updated description"
              service_date: "2025-03-22"
      responses:
        200:
          description: "Service ticket updated"
          schema:
            $ref: "#/definitions/ServiceTicket"
        400:
          description: "Validation error or VIN/date conflict"
        404:
          description: "Service ticket not found"

  /service_tickets/{ticket_id}/assign_mechanic/{mechanic_id}:
    post:
      tags:
        - Service Tickets
      summary: "Assign a mechanic to a service ticket"
      parameters:
        - in: path
          name: ticket_id
          required: true
          type: integer
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "Mechanic assigned successfully"
          schema:
            $ref: "#/definitions/AssignMechanicResponse"
        400:
          description: "Mechanic already assigned"
        404:
          description: "Ticket or mechanic not found"

  /service_tickets/{ticket_id}/remove_mechanic/{mechanic_id}:
    put:
      tags:
        - Service Tickets
      summary: "Remove a mechanic from a service ticket"
      parameters:
        - in: path
          name: ticket_id
          required: true
          type: integer
        - in: path
          name: mechanic_id
          required: true
          type: integer
      responses:
        200:
          description: "Mechanic removed successfully"
        400:
          description: "Mechanic not assigned to this ticket"
        404:
          description: "Ticket or mechanic not found"
  /service_tickets/{ticket_id}/add_part:
    post:
      tags:
        - Service Tickets
      summary: "Add an inventory part to a service ticket"
      parameters:
        - in: path
          name: ticket_id
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/AddPartToTicketPayload"
          examples:
            application/json:
              inventory_id: 3
              quantity_used: 2
      responses:
        201:
          description: "Part added to ticket"
          schema:
            $ref: "#/definitions/AddPartToTicketResponse"
        400:
          description: "Not enough stock"
        404:
          description: "Ticket or inventory item not found"

  /inventory:
    post:
      tags:
        - Inventory
      summary: "Create a new inventory item"
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateInventoryPayload"
          examples:
            application/json:
              item_name: "Brake Pads"
              quantity: 50
              price: 29.99
      responses:
        201:
          description: "Inventory item created"
          schema:
            $ref: "#/definitions/Inventory"
        400:
          description: "Invalid input"

    get:
      tags:
        - Inventory
      summary: "Get all inventory items (paginated)"
      parameters:
        - in: query
          name: page
          type: integer
        - in: query
          name: per_page
          type: integer
      responses:
        200:
          description: "List of inventory items"
          schema:
            type: object
            properties:
              inventory:
                type: array
                items:
                  $ref: "#/definitions/Inventory"
              total: { type: integer }
              page: { type: integer }
              per_page: { type: integer }
              pages: { type: integer }

  /inventory/{item_id}:
    get:
      tags:
        - Inventory
      summary: "Get a single inventory item"
      parameters:
        - in: path
          name: item_id
          required: true
          type: integer
      responses:
        200:
          description: "Inventory item found"
          schema:
            $ref: "#/definitions/Inventory"
        404:
          description: "Item not found"
    put:
      tags:
        - Inventory
      summary: "Update an inventory item"
      parameters:
        - in: path
          name: item_id
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UpdateInventoryPayload"
          examples:
            application/json:
              item_name: "Updated Brake Pads"
              quantity: 40
              price: 27.99
      responses:
        200:
          description: "Inventory item updated"
          schema:
            $ref: "#/definitions/Inventory"
        404:
          description: "Item not found"
    delete:
      tags:
        - Inventory
      summary: "Delete an inventory item"
      parameters:
        - in: path
          name: item_id
          required: true
          type: integer
      responses:
        200:
          description: "Item deleted"
          schema:
            $ref: "#/definitions/DeleteInventoryResponse"
          examples:
            application/json:
              message: "Item deleted"
        404:
          description: "Item not found"

definitions:

  LoginCredentials:
    type: object
    properties:
      email:
        type: string
      password:
        type: string
    required:
      - email
      - password

  LoginResponse:
    type: object
    properties:
      auth_token:
        type: string
      message:
        type: string
      status:
        type: string
    required:
      - auth_token
      - message
      - status

  Customer:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      email:
        type: string
      phone:
        type: string
    required:
      - id
      - name
      - email
      - phone

  CreateCustomerPayload:
    type: object
    properties:
      name:
        type: string
      phone:
        type: string
      email:
        type: string
      password:
        type: string
    required:
      - name
      - phone
      - email
      - password

  CreateCustomerResponse:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      email:
        type: string
      phone:
        type: string
    required:
      - id
      - name
      - email
      - phone
      
  DeleteCustomerResponse:
    type: object
    properties:
      message:
        type: string
    required:
      - message

  Mechanic:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      email:
        type: string
      salary:
        type: number
      role_id:
        type: integer
    required:
      - id
      - name
      - phone
      - email
      - salary
      - role_id

  CreateMechanicPayload:
    type: object
    properties:
      name:
        type: string
      phone:
        type: string
      email:
        type: string
      password:
        type: string
      salary:
        type: number
    required:
      - name
      - phone
      - email
      - password
      - salary

  MechanicLoginPayload:
    type: object
    properties:
      email:
        type: string
      password:
        type: string
    required:
      - email
      - password

  MechanicLoginResponse:
    type: object
    properties:
      status:
        type: string
      message:
        type: string
      auth_token:
        type: string
    required:
      - status
      - message
      - auth_token

  PopularMechanicResponse:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      email:
        type: string
      ticket_count:
        type: integer
    required:
      - id
      - name
      - email
      - ticket_count

  ServiceTicket:
    type: object
    properties:
      id:
        type: integer
      VIN:
        type: string
      service_date:
        type: string
        format: date
      description:
        type: string
      customer_id:
        type: integer
      customer:
        type: object
        properties:
          id: { type: integer }
          name: { type: string }
          email: { type: string }
      mechanics:
        type: array
        items:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            email: { type: string }
      inventory_service_tickets:
        type: array
        items:
          type: object
    required:
      - VIN
      - service_date
      - description
      - customer_id

  CreateServiceTicketPayload:
    type: object
    properties:
      VIN:
        type: string
      service_date:
        type: string
        format: date
      description:
        type: string
      customer_id:
        type: integer
    required:
      - VIN
      - service_date
      - description
      - customer_id

  UpdateServiceTicketPayload:
    type: object
    properties:
      VIN:
        type: string
      service_date:
        type: string
        format: date
      description:
        type: string
      customer_id:
        type: integer

  AssignMechanicResponse:
    type: object
    properties:
      message:
        type: string
    required:
      - message

  Inventory:
    type: object
    properties:
      id:
        type: integer
      item_name:
        type: string
      quantity:
        type: integer
      price:
        type: number
    required:
      - item_name
      - quantity
      - price

  CreateInventoryPayload:
    type: object
    properties:
      item_name:
        type: string
      quantity:
        type: integer
      price:
        type: number
    required:
      - item_name
      - quantity
      - price

  UpdateInventoryPayload:
    type: object
    properties:
      item_name:
        type: string
      quantity:
        type: integer
      price:
        type: number

  DeleteInventoryResponse:
    type: object
    properties:
      message:
        type: string
    required:
      - message

  AddPartToTicketPayload:
    type: object
    properties:
      inventory_id:
        type: integer
      quantity_used:
        type: integer
    required:
      - inventory_id

  AddPartToTicketResponse:
    type: object
    properties:
      message:
        type: string
    required:
      - message







